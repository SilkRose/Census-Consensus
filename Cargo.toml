[workspace]
resolver = "3"
members = ["packages/backend", "packages/frontend"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.102"
actix-files = "0.6.10"
actix-web = { version = "4.13.0", features = ["macros"] }
bon = "3.9.0"
base64ct = { version = "1.8.3", features = ["std"] }
chrono = { version = "0.4.44", features = ["serde"] }
console-error-panic-hook = { package = "console_error_panic_hook", version = "0.1.7" }
dotenvy = "0.15.7"
leptos = { version = "0.8.15", features = ["csr", "nightly"] }
leptos-meta = { package = "leptos_meta", version = "0.8.5" }
leptos-mview = { version = "0.4.4", features = ["nightly"] }
leptos-router = { package = "leptos_router", version = "0.8.11", features = [
	"nightly",
] }
lightningcss = "1.0.0-alpha.70"
maud = "0.27.0"
pony = { git = "https://github.com/SilkRose/Pony", rev = "8443bd10e99954471ad0d80c01bb8b7da463781c" }
rand = { version = "0.10.0", default-features = false, features = [
	"chacha",
	"sys_rng",
] }
reqwest = { version = "0.13.2", features = ["json", "form"] }
serde = { version = "1.0.228", features = ["derive"] }
serde-json = { package = "serde_json", version = "1.0.149" }
serde-urlencoded = { package = "serde_urlencoded", version = "0.7.1" }
sqlx = { version = "0.8.6", default-features = false, features = [
	"chrono",
	"macros",
	"migrate",
	"postgres",
	"runtime-tokio",
	"tls-rustls",
] }
url = { version = "2.5.8" }
wasm-bindgen = "=0.2.108"

[profile.dev.package."*"]
opt-level = 3

[profile.wasm-release]
inherits = "release"
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
